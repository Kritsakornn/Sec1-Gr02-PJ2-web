# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deploy folder
        run: |
          mkdir -p deploy
          # Copy all HTML files to root of deploy folder
          cp sec1_gr02_fe_src/html/*.html deploy/
          # Make GitHub Pages use error.html as the custom 404 page
          cp deploy/error.html deploy/404.html
          # Copy static assets (CSS, JS, images) to deploy folder root
          cp sec1_gr02_fe_src/static/style.css deploy/
          cp sec1_gr02_fe_src/static/script.js deploy/
          # Copy images folder if it exists
          if [ -d "sec1_gr02_fe_src/static/Images" ]; then
            cp -r sec1_gr02_fe_src/static/Images deploy/
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'deploy'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
