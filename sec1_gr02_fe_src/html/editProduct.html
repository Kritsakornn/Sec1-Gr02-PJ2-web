<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoonShop - Edit Product</title>
    <link rel="stylesheet" href="/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Judson:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <header class="top-header">
        <div class="logo">GoonShop</div>

        <div class="search-container">
            <svg class="icon-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" class="search-input" placeholder="Search by Name">
        </div>

        <div class="header-icons">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
            </svg>
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="21" r="1"></circle>
                <circle cx="20" cy="21" r="1"></circle>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
            <a href="/admin" aria-label="Admin Login" style="color: inherit; text-decoration: none; display: flex; align-items: center;">
                <svg class="icon user-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"></path>
                </svg>
            </a>
        </div>

        <div id="search-overlay" class="search-overlay hidden">
            <div class="search-panel">
                <div class="filter-row">
                    <label>Price</label>
                    <div class="price-range-inputs">
                        <input type="number" id="min-price" placeholder="MIN" min="0">
                        <span>-</span>
                        <input type="number" id="max-price" placeholder="MAX" min="0">
                    </div>
                </div>
    
                <div class="filter-row">
                    <label>Brand</label>
                    <input type="text" id="brand-input" placeholder="Search">
                </div>
    
                <div class="filter-row">
                    <label>Ingredient</label>
                    <div class="checkbox-group">
                        <label><input type="radio" name="ing"> Chicken</label>
                        <label><input type="radio" name="ing"> Beef</label>
                        <label><input type="radio" name="ing"> Fish</label>
                        <label><input type="radio" name="ing"> Pork</label>
                        <label><input type="radio" name="ing"> Vegetable</label>
                    </div>
                </div>
    
                <div class="search-footer">
                    <button id="search-btn">Search</button>
                </div>
            </div>
        </div>
    </header>

    <nav class="main-nav">
        <a href="/home">Home</a>
        <a href="/product" class="active">Product</a>
        <a href="/team">Team</a>
    </nav>

    <main class="add-product-main">
        <div class="add-product-container">
            <form id="editForm" class="add-form-box" enctype="multipart/form-data">

                <div class="image-col">
                    <div class="img-placeholder">
                        <img id="previewImage" style="width:100%; display:none; border-radius:10px;"
                            alt="Product Preview" />
                    </div>

                    <input type="file" id="imageInput" name="image" accept="image/*" class="file-input">

                    <div class="action-btn-group">
                        <a href="/product-management" class="btn-form">Cancel</a>
                        <button type="submit" class="btn-form">Update</button>
                    </div>
                </div>

                <div class="form-col">
                    <label for="productId">Product ID (ReadOnly)</label>
                    <input id="productId" name="ProductID" type="text" class="form-input" readonly>

                    <label for="productName">Product Name</label>
                    <input id="productName" name="ProductName" type="text" class="form-input" placeholder="Product name"
                        required>

                    <label for="price">Price</label>
                    <input id="price" name="Price" type="number" class="form-input" placeholder="Price" required>

                    <label for="brand">Brand</label>
                    <input id="brand" name="Brand" type="text" class="form-input" placeholder="Brand" required>

                    <label for="mfgDate">MFG Date</label>
                    <input id="mfgDate" name="MFGDate" type="date" class="form-input" required>

                    <label for="expDate">EXP Date</label>
                    <input id="expDate" name="EXPDate" type="date" class="form-input" required>

                    <label for="ingredients">Ingredients</label>
                    <textarea id="ingredients" name="Ingredients" class="form-textarea"
                        placeholder="Ingredients (comma separated)"></textarea>
                </div>

            </form>
        </div>
    </main>

    <footer>
        <div class="footer-container">
            <p>© 2026 GoonShop. All rights reserved.</p>
            <ul class="footer-links">
                <li><a href="#">About Us</a></li>
                <li><a href="#">Contact</a></li>
                <li><a href="#">Privacy Policy</a></li>
                <li><a href="#">Terms of Service</a></li>
            </ul>
            <div class="footer-contact">
                <p>Email: support@goonshop.com</p>
                <p>Tel: 083-080-1181</p>
            </div>
        </div>
    </footer>

    <script src="/script.js"></script>

    <script>
        document.getElementById("imageInput").addEventListener("change", function () {
            const file = this.files[0];
            const preview = document.getElementById("previewImage");

            if (file) {
                preview.src = URL.createObjectURL(file);
                preview.style.display = "block";
            }
        });
    </script>

</body>

</html>
