<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Error - Something Went Wrong</title>

    <style>
        /* ==========================================
           CUSTOM PROPERTIES
        ========================================== */
        :root {
            --bg-header: #f2eacc;
            --bg-main: #faf8f2;
            --bg-white: #ffffff;

            --text-color: #1a1208;
            --text-muted: #7a6e58;
            --text-faint: #b5ac97;

            --border-soft: #c8b98a;

            --accent: #c95c30;
            --danger: #a32d2d;
            --danger-bg: #fcebeb;

            --font-main: 'Courier Prime', Courier, monospace;

            --radius-lg: 10px;
            --radius-xl: 12px;
            --radius-round: 20px;

            --shadow-md: 4px 5px 0 rgba(100, 80, 30, 0.10);
            --shadow-lg: 5px 6px 0 rgba(0, 0, 0, 0.12);

            --transition-fast: 0.18s ease;
        }

        /* ==========================================
           BASE
        ========================================== */
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: var(--font-main);
            background: var(--bg-main);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* ==========================================
           ERROR CARD
        ========================================== */
        .error-box {
            width: 100%;
            max-width: 520px;
            background: var(--bg-white);
            border: 1.5px solid var(--border-soft);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            padding: 42px 36px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .error-code {
            font-size: 5rem;
            font-weight: 700;
            margin: 0;
            color: var(--danger);
            letter-spacing: 2px;
        }

        .error-title {
            font-size: 1.8rem;
            margin: 10px 0 8px;
            font-weight: 700;
        }

        .error-message {
            font-size: 1rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 28px;
        }

        .error-badge {
            display: inline-block;
            background: var(--danger-bg);
            color: var(--danger);
            padding: 6px 14px;
            border-radius: var(--radius-round);
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 18px;
            border: 1px solid rgba(163, 45, 45, 0.25);
        }

        /* ==========================================
           BUTTON
        ========================================== */
        .btn {
            display: inline-block;
            padding: 12px 22px;
            border-radius: var(--radius-round);
            border: 1.5px solid var(--border-soft);
            background: var(--text-color);
            color: var(--bg-main);
            font-weight: 700;
            transition: all var(--transition-fast);
            box-shadow: var(--shadow-md);
        }

        .btn:hover {
            background: var(--accent);
            transform: translateY(-2px);
        }

        .btn-secondary {
            margin-left: 10px;
            background: var(--bg-white);
            color: var(--text-color);
        }

        .btn-secondary:hover {
            background: var(--bg-header);
        }

        /* ==========================================
           DECORATION
        ========================================== */
        .corner {
            position: absolute;
            width: 120px;
            height: 120px;
            background: var(--bg-header);
            border: 1px solid var(--border-soft);
            border-radius: 50%;
            opacity: 0.6;
        }

        .corner.top-left {
            top: -60px;
            left: -60px;
        }

        .corner.bottom-right {
            bottom: -60px;
            right: -60px;
        }
    </style>
</head>

<body>

    <div class="error-box">

        <div class="corner top-left"></div>
        <div class="corner bottom-right"></div>

        <div class="error-badge">SYSTEM ERROR</div>

        <h1 class="error-code">404</h1>

        <h2 class="error-title">Page Not Found</h2>

        <p class="error-message">
            The page you’re looking for doesn’t exist or may have been moved.<br>
            Please check the URL or return to the homepage.
        </p>

        <a href="index.html" class="btn">Go Home</a>
        <a href="javascript:history.back()" class="btn btn-secondary">Go Back</a>

    </div>

</body>
</html>
