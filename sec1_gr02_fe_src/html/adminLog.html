<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoonShop - Log Management</title>

    <!-- FIXED PATH -->
    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Judson:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- ================= HEADER ================= -->
    <header class="top-header">

        <!-- Logo -->
        <div class="logo">GoonShop</div>

        <!-- Search -->
        <div class="search-container">
            <svg class="icon-search" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" class="search-input" placeholder="Search by Name">
        </div>

        <!-- Header Icons -->
        <div class="header-icons">

            <!-- Favorite -->
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path
                    d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 
                    5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 
                    1.06-1.06a5.5 5.5 0 0 0 0-7.78z">
                </path>
            </svg>

            <!-- Cart -->
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="21" r="1"></circle>
                <circle cx="20" cy="21" r="1"></circle>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>

            <!-- Admin -->
            <a href="adminLogin.html" aria-label="Admin Login"
                style="color: inherit; text-decoration: none; display: flex; align-items: center;">
                <svg class="icon user-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M12 2C6.48 2 2 6.48 2 12s4.48 10 
                        10 10 10-4.48 10-10S17.52 2 
                        12 2zm0 3c1.66 0 3 1.34 3 
                        3s-1.34 3-3 3-3-1.34-3-3 
                        1.34-3 3-3zm0 14.2c-2.5 
                        0-4.71-1.28-6-3.22.03-1.99 
                        4-3.08 6-3.08 1.99 0 5.97 
                        1.09 6 3.08-1.29 1.94-3.5 
                        3.22-6 3.22z">
                    </path>
                </svg>
            </a>
        </div>

        <!-- Search Overlay -->
        <div id="search-overlay" class="search-overlay hidden">
            <div class="search-panel">

                <!-- Price -->
                <div class="search-row">
                    <label>Price</label>
                    <div class="price-range-inputs">
                        <input type="number" id="min-price" placeholder="MIN" min="0">
                        <span>-</span>
                        <input type="number" id="max-price" placeholder="MAX" min="0">
                    </div>
                </div>

                <!-- Brand -->
                <div class="search-row">
                    <label>Brand</label>
                    <input type="text" id="brand-input" placeholder="Search">
                </div>

                <!-- Ingredient -->
                <div class="search-row">
                    <label>Ingredient</label>
                    <div class="checkbox-group">
                        <label><input type="radio" name="ing"> Chicken</label>
                        <label><input type="radio" name="ing"> Beef</label>
                        <label><input type="radio" name="ing"> Fish</label>
                        <label><input type="radio" name="ing"> Pork</label>
                        <label><input type="radio" name="ing"> Vegetable</label>
                    </div>
                </div>

                <!-- Search Button -->
                <div class="search-footer">
                    <button id="search-btn">Search</button>
                </div>

            </div>
        </div>

    </header>

    <!-- ================= NAV ================= -->
    <nav class="main-nav">
        <a href="index.html">Home</a>
        <a href="productPage.html">Product</a>
        <a href="teamPage.html">Team</a>
    </nav>

    <!-- MAIN -->
    <main class="admin-main">
        <div class="admin-container">

            <div class="action-buttons">
                <a href="adminLog.html"><button class="btn-outline">Log</button></a>
                <a href="addProduct.html"><button class="btn-outline">Add</button></a>
                <button id="toggleDeleteBtn" class="btn-outline">Delete</button>
            </div>

            <h3 class="log-title">Log Actions</h3>

            <div class="product-table-wrapper">
                <div class="table-header">
                    <span>Log ID</span>
                    <span>Action</span>
                    <span>Username</span>
                    <span>Password</span>
                    <span>Timestamp</span>
                </div>

                <div class="table-body" id="logTable">
                    <p>Loading logs...</p>
                </div>
            </div>

        </div>
    </main>

    <!-- ================= FOOTER ================= -->
    <footer>
        <div class="footer-container">

            <p>© 2026 GoonShop. All rights reserved.</p>

            <!-- Links -->
            <ul class="footer-links">
                <li><a href="#">About Us</a></li>
                <li><a href="#">Contact</a></li>
                <li><a href="#">Privacy Policy</a></li>
                <li><a href="#">Terms of Service</a></li>
            </ul>

            <!-- Contact -->
            <div class="footer-contact">
                <p>Email: support@goonshop.com</p>
                <p>Tel: 083-080-1181</p>
            </div>

        </div>
    </footer>

    <!-- ================= SCRIPTS ================= -->
    <script src="script.js"></script>

</body>

</html>
